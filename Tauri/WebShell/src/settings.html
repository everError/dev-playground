<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>서버 설정</title>
    <script src="settings.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>서버 설정</h1>
      <form id="form">
        <label for="serverUrl">접속할 사이트 주소</label>
        <input
          id="serverUrl"
          type="url"
          required
          placeholder="http://localhost:9060"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="row">
          <button type="submit" class="primary">저장</button>
          <button type="button" id="reset" class="danger" title="저장된 설정을 삭제하고 미설정 상태로 되돌립니다">
            설정 초기화
          </button>
          <button type="button" id="exit">프로그램 종료</button>
        </div>
      </form>
      <p class="hint">어느 화면에서든 <kbd>Ctrl</kbd>+<kbd>F12</kbd> 로 이 설정을 열 수 있습니다.</p>
    </main>
  </body>
</html>
